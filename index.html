<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escáner QR</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    padding:20px;
    background:#f5f5f5;
    text-align:center;
}

h1{
    color:#333;
}

#reader{
    width:100%;
    max-width:500px;
    margin:20px auto;
    border:2px solid #ddd;
    border-radius:10px;
    overflow:hidden;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    margin:5px;
}

.btn-start{
    background:#28a745;
    color:white;
}

.btn-clear{
    background:#dc3545;
    color:white;
}

table{
    width:100%;
    max-width:800px;
    margin:20px auto;
    border-collapse:collapse;
    background:white;
}

th, td{
    border:1px solid #ddd;
    padding:10px;
    text-align:left;
}

th{
    background:#007bff;
    color:white;
}

#status{
    margin:10px;
    font-weight:bold;
}
</style>
</head>
<body>

<h1>Escáner de Códigos QR</h1>

<button class="btn-start" onclick="iniciarScanner()">
Abrir Cámara
</button>

<button class="btn-clear" onclick="limpiarRegistros()">
Limpiar Registros
</button>

<div id="status">Esperando...</div>

<div id="reader"></div>

<h2>Códigos Capturados</h2>

<table>
    <thead>
        <tr>
            <th>#</th>
            <th>Contenido QR</th>
            <th>Fecha/Hora</th>
        </tr>
    </thead>
    <tbody id="tablaQR"></tbody>
</table>

<script src="https://unpkg.com/html5-qrcode"></script>

<script>

let scannerActivo = false;
let html5QrCode;

const STORAGE_KEY = "codigos_qr";

cargarRegistros();

function iniciarScanner(){

    if(scannerActivo) return;

    html5QrCode = new Html5Qrcode("reader");

    Html5Qrcode.getCameras()
    .then(cameras => {

        if(!cameras || cameras.length === 0){
            alert("No se encontró cámara.");
            return;
        }

        let camaraTrasera = cameras[cameras.length - 1].id;

        html5QrCode.start(
            camaraTrasera,
            {
                fps: 10,
                qrbox: 250
            },
            onScanSuccess
        );

        scannerActivo = true;
        document.getElementById("status").innerText =
            "Escaneando...";

    })
    .catch(err=>{
        console.error(err);
        alert("Error al acceder a la cámara.");
    });
}

function onScanSuccess(decodedText){

    let registros =
        JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

    const existe = registros.some(
        r => r.codigo === decodedText
    );

    if(existe){
        return;
    }

    const nuevoRegistro = {
        codigo: decodedText,
        fecha: new Date().toLocaleString()
    };

    registros.push(nuevoRegistro);

    localStorage.setItem(
        STORAGE_KEY,
        JSON.stringify(registros)
    );

    cargarRegistros();

    document.getElementById("status").innerText =
        "QR detectado: " + decodedText;

    navigator.vibrate?.(200);
}

function cargarRegistros(){

    let registros =
        JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

    let html = "";

    registros.forEach((item,index)=>{

        html += `
        <tr>
            <td>${index + 1}</td>
            <td>${item.codigo}</td>
            <td>${item.fecha}</td>
        </tr>
        `;
    });

    document.getElementById("tablaQR").innerHTML = html;
}

function limpiarRegistros(){

    if(!confirm("¿Eliminar todos los registros?")){
        return;
    }

    localStorage.removeItem(STORAGE_KEY);
    cargarRegistros();

    document.getElementById("status").innerText =
        "Registros eliminados";
}
</script>

</body>
</html>
