<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sistema de Estudiantes y Asistencias</title>

<link rel="stylesheet" href="styles.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script src="https://unpkg.com/html5-qrcode"></script>

</head>
<body>

<header>
<h1>
<i class="fa-solid fa-graduation-cap"></i>
Sistema de Gestión Académica
</h1>
</header>

<div class="contenedor">

<div class="acciones">

<button onclick="nuevoEstudiante()">
<i class="fa fa-user-plus"></i>
Nuevo Estudiante
</button>

<button onclick="abrirScanner()">
<i class="fa fa-qrcode"></i>
Registrar Asistencia QR
</button>

<button onclick="exportarDatos()">
<i class="fa fa-download"></i>
Exportar Backup
</button>

<button onclick="document.getElementById('importFile').click()">
<i class="fa fa-upload"></i>
Importar Backup
</button>

<input type="file"
id="importFile"
accept=".json"
style="display:none"
onchange="importarDatos(event)">
</div>

<section>

<h2>Lista de Estudiantes</h2>

<table>
<thead>
<tr>
<th>DNI</th>
<th>Nombres</th>
<th>Apellidos</th>
<th>Género</th>
<th>Teléfono</th>
<th>Edad</th>
<th>Acciones</th>
</tr>
</thead>

<tbody id="tablaEstudiantes"></tbody>

</table>

</section>

<section>

<h2>Registro de Asistencias</h2>

<table>
<thead>
<tr>
<th>DNI</th>
<th>Nombre</th>
<th>Fecha</th>
<th>Hora</th>
<th>Acciones</th>
</tr>
</thead>

<tbody id="tablaAsistencias"></tbody>

</table>

</section>

<div id="reader"></div>

</div>

<script src="app.js"></script>

</body>
</html>
